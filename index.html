<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EVE行星材料查询</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        /* 动态星空背景 */
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            min-height: 100vh;
            color: #e0e0e0;
            padding: 10px;
            overflow-x: hidden;
            background: #050510;
        }

        /* 星空背景层 */
        .stars-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -3;
            background: radial-gradient(ellipse at bottom, #1a1a3e 0%, #050510 100%);
        }

        /* 星云层 */
        .nebula {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -2;
            opacity: 0.15;
            background:
                radial-gradient(ellipse at 20% 20%, rgba(100, 50, 150, 0.4) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(50, 100, 150, 0.3) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(0, 100, 200, 0.2) 0%, transparent 60%);
            animation: nebulaDrift 30s ease-in-out infinite alternate;
        }

        @keyframes nebulaDrift {
            0% { transform: scale(1) rotate(0deg); opacity: 0.12; }
            50% { transform: scale(1.1) rotate(2deg); opacity: 0.18; }
            100% { transform: scale(1.05) rotate(-1deg); opacity: 0.15; }
        }

        /* 星星层 */
        .stars {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
        }
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle var(--duration) ease-in-out infinite;
        }
        .star.small { width: 1px; height: 1px; opacity: 0.5; }
        .star.medium { width: 2px; height: 2px; opacity: 0.7; }
        .star.large { width: 3px; height: 3px; opacity: 0.9; box-shadow: 0 0 6px rgba(0, 200, 255, 0.5); }
        .star.cyan { background: #00c8ff; box-shadow: 0 0 8px #00c8ff; }
        @keyframes twinkle {
            0%, 100% { opacity: var(--opacity); transform: scale(1); }
            50% { opacity: calc(var(--opacity) * 1.5); transform: scale(1.2); }
        }

        /* 流星效果 */
        .meteor {
            position: fixed;
            width: 2px; height: 80px;
            background: linear-gradient(to bottom, rgba(0, 200, 255, 0.8), transparent);
            transform: rotate(-45deg);
            animation: meteor 8s linear infinite;
            opacity: 0; z-index: -1;
        }
        @keyframes meteor {
            0% { top: -100px; left: 100%; opacity: 0; }
            10% { opacity: 0.6; }
            30% { top: 30%; left: 70%; opacity: 0; }
            100% { top: 100%; left: 0%; opacity: 0; }
        }
        .meteor:nth-child(2) { animation-delay: 3s; left: 80%; }
        .meteor:nth-child(3) { animation-delay: 6s; left: 60%; }

        /* 主布局：左主内容 + 右侧边栏 */
        .main-layout {
            display: flex;
            gap: 10px;
            position: relative;
            z-index: 1;
            max-width: 960px;
            margin: 0 auto;
        }

        .main-content {
            flex: 1;
            min-width: 0;
        }

        .sidebar {
            width: 260px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        /* 移动端侧边栏切换按钮 */
        .sidebar-toggle {
            display: none;
            position: fixed;
            top: 10px; right: 10px;
            z-index: 500;
            padding: 8px 12px;
            background: rgba(0, 200, 255, 0.2);
            border: 1px solid #00c8ff;
            color: #00c8ff;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
        }

        /* 标题 */
        .header {
            background: linear-gradient(135deg, #0f1825, #162033);
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            border: 1px solid #00c8ff;
            margin-bottom: 10px;
        }
        .header h1 { color: #00c8ff; font-size: 18px; }
        .header p { color: #888; font-size: 12px; margin-top: 5px; }

        /* 开采中心 */
        .center-section {
            background: rgba(255,255,255,0.03);
            border-radius: 10px;
            padding: 15px;
            border: 1px solid rgba(0, 200, 255, 0.1);
            margin-bottom: 10px;
        }
        .center-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .center-header h3 { color: #00c8ff; font-size: 14px; }
        .btn-add { padding: 5px 12px; background: transparent; border: 1px solid #00c8ff; color: #00c8ff; border-radius: 5px; font-size: 12px; cursor: pointer; transition: all 0.2s; }
        .btn-add:hover { background: rgba(0,200,255,0.15); }
        .center-list-multi { display: flex; flex-direction: column; gap: 6px; }
        .center-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 10px; background: rgba(0,0,0,0.3); border-radius: 8px; border: 1px solid rgba(0,200,255,0.2); transition: all 0.2s; }
        .center-item.active { border-color: #00c8ff; background: rgba(0, 200, 255, 0.08); }
        .center-item:hover { background: rgba(0,200,255,0.05); }
        .center-info { display: flex; flex-direction: column; gap: 2px; }
        .center-info .name { color: #00c8ff; font-weight: bold; font-size: 13px; }
        .center-info .location { color: #888; font-size: 11px; }
        .center-info .system { color: #ffaa00; font-size: 11px; }
        .btn-del { padding: 4px 8px; background: #333; color: #888; border: none; border-radius: 5px; font-size: 11px; cursor: pointer; transition: all 0.2s; }
        .btn-del:hover { background: #e74c3c; color: #fff; }

        /* 搜索区域 */
        .search-section {
            background: rgba(255,255,255,0.03);
            border-radius: 10px;
            padding: 15px;
            border: 1px solid rgba(0, 200, 255, 0.1);
            margin-bottom: 10px;
        }
        .search-tabs { display: flex; gap: 5px; margin-bottom: 10px; }
        .search-tab { flex: 1; padding: 10px; background: rgba(0,0,0,0.3); border: none; color: #888; border-radius: 8px; cursor: pointer; font-size: 13px; }
        .search-tab.active { background: linear-gradient(135deg, #00c8ff, #0088ff); color: white; }

        .search-row { display: flex; gap: 10px; margin-bottom: 10px; }
        .search-row select, .search-row input { flex: 1; padding: 10px; background: #0a0a12; border: 1px solid #333; color: #fff; border-radius: 8px; font-size: 14px; }
        .search-row select:focus, .search-row input:focus { border-color: #00c8ff; }
        .btn-search { padding: 10px 20px; background: linear-gradient(135deg, #00c8ff, #0088ff); border: none; color: white; border-radius: 8px; cursor: pointer; }

        /* 模糊搜索下拉 */
        .search-wrapper { position: relative; flex: 1; }
        .search-dropdown {
            position: absolute;
            top: 100%; left: 0; right: 0;
            background: #0d1520;
            border: 1px solid #00c8ff;
            border-radius: 8px;
            max-height: 200px;
            overflow-y: auto;
            z-index: 100;
            display: none;
        }
        .search-dropdown.show { display: block; }
        .dropdown-item {
            padding: 10px;
            cursor: pointer;
            border-bottom: 1px solid rgba(0, 200, 255, 0.1);
        }
        .dropdown-item:hover { background: rgba(0, 200, 255, 0.1); }
        .dropdown-item:last-child { border-bottom: none; }
        .dropdown-item .main { color: #00c8ff; }
        .dropdown-item .sub { color: #888; font-size: 12px; margin-top: 3px; }

        /* 结果 */
        .results-section {
            background: rgba(255,255,255,0.03);
            border-radius: 10px;
            padding: 15px;
            border: 1px solid rgba(0, 200, 255, 0.1);
        }
        .results-header { display: flex; justify-content: space-between; margin-bottom: 10px; }
        .results-header h3 { color: #00c8ff; font-size: 14px; }
        .result-count { color: #888; font-size: 12px; }
        .results-list { display: flex; flex-direction: column; gap: 8px; max-height: 400px; overflow-y: auto; }

        /* 材料卡片 */
        .material-card { padding: 12px; background: rgba(0,0,0,0.3); border-radius: 8px; }
        .material-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .material-name { font-weight: bold; }
        .tag { font-size: 10px; padding: 2px 8px; border-radius: 10px; font-weight: bold; }
        .tag-same-c { background: #00ff00; color: #000; }
        .tag-same-p { background: #ff00ff; color: #fff; }
        .material-stats { display: flex; gap: 20px; margin-bottom: 8px; }
        .stat { display: flex; flex-direction: column; }
        .stat-label { color: #888; font-size: 11px; }
        .stat-value.output { color: #00ff00; font-weight: bold; }
        .best-location { display: flex; gap: 10px; color: #888; font-size: 12px; }
        .best-location .output { color: #00ff00; }
        .material-actions { margin-top: 8px; display: flex; gap: 5px; }
        .material-actions button { padding: 5px 15px; background: rgba(0, 200, 255, 0.2); border: 1px solid #00c8ff; color: #00c8ff; border-radius: 5px; cursor: pointer; font-size: 12px; }
        .btn-record { background: rgba(255, 170, 0, 0.2); border-color: #ffaa00; color: #ffaa00; }

        /* 星座搜索结果 */
        .constellation-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; background: rgba(0,0,0,0.3); border-radius: 8px; cursor: pointer; }
        .constellation-item:hover { background: rgba(0, 200, 255, 0.1); }
        .constellation-name { color: #00c8ff; }
        .region-name { color: #888; }
        .select-btn { padding: 5px 10px; background: #00c8ff; color: #0a0a12; border-radius: 5px; font-size: 11px; }

        /* 材料搜索结果 */
        .material-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; background: rgba(0,0,0,0.3); border-radius: 8px; cursor: pointer; }
        .material-item:hover { background: rgba(0, 200, 255, 0.1); }
        .find-btn { padding: 5px 10px; background: #00c8ff; color: #0a0a12; border-radius: 5px; font-size: 11px; }

        /* 详情页 */
        .detail-header { display: flex; justify-content: space-between; align-items: center; padding: 10px; margin-bottom: 10px; }
        .back-btn { color: #00c8ff; cursor: pointer; }
        .material-title { font-weight: bold; }
        .constellation-name { color: #888; }
        .detail-list { display: flex; flex-direction: column; gap: 5px; }
        .detail-row { display: flex; gap: 10px; padding: 8px; background: rgba(0,0,0,0.2); border-radius: 5px; }
        .detail-row.same-planet { background: rgba(255, 0, 255, 0.1); border: 1px solid #ff00ff; }
        .rank { color: #00c8ff; width: 20px; }
        .planet { flex: 1; }
        .richness { color: #888; }
        .output { color: #00ff00; }

        /* 弹窗 */
        .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center; }
        .modal.show { display: flex; }
        .modal-content { background: #0d1520; padding: 20px; border-radius: 15px; width: 90%; max-width: 400px; border: 1px solid #00c8ff; max-height: 80vh; overflow-y: auto; }
        .modal-content h3 { color: #00c8ff; text-align: center; margin-bottom: 15px; }
        .modal-content input, .modal-content select { width: 100%; padding: 10px; margin-bottom: 10px; background: #0a0a12; border: 1px solid #333; color: #fff; border-radius: 8px; }
        .modal-buttons { display: flex; gap: 10px; margin-top: 15px; }
        .modal-buttons button { flex: 1; padding: 10px; border: none; border-radius: 8px; cursor: pointer; }
        .btn-confirm { background: #00c8ff; color: #0a0a12; }
        .btn-cancel { background: #333; color: #888; }
        .mode-switch { display: flex; gap: 5px; margin-bottom: 10px; background: rgba(0,0,0,0.3); padding: 5px; border-radius: 5px; }
        .mode-btn { flex: 1; padding: 8px; background: transparent; border: none; color: #888; border-radius: 5px; cursor: pointer; font-size: 12px; }
        .mode-btn.active { background: rgba(0, 200, 255, 0.2); color: #00c8ff; }
        .hint { color: #888; font-size: 11px; margin-bottom: 8px; }

        /* 侧边栏通用面板 */
        .sidebar-panel {
            background: rgba(255,255,255,0.03);
            border-radius: 10px;
            padding: 12px;
            border: 1px solid rgba(0, 200, 255, 0.1);
        }
        .sidebar-panel-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .sidebar-panel-header h3 { color: #00c8ff; font-size: 13px; }

        /* 开采中心侧边栏列表 */
        .sidebar-center-item {
            padding: 8px;
            background: rgba(0,0,0,0.3);
            border-radius: 6px;
            border: 1px solid rgba(0,200,255,0.15);
            margin-bottom: 5px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .sidebar-center-item:hover { border-color: rgba(0,200,255,0.4); }
        .sidebar-center-item.active { border-color: #00c8ff; background: rgba(0,200,255,0.08); }
        .sidebar-center-name { color: #00c8ff; font-weight: bold; font-size: 12px; }
        .sidebar-center-location { color: #888; font-size: 11px; margin-top: 2px; }
        .sidebar-center-system { color: #ffaa00; font-size: 11px; }
        .sidebar-center-actions { display: flex; gap: 5px; margin-top: 5px; }
        .sidebar-center-actions button { padding: 3px 8px; font-size: 10px; background: rgba(0,200,255,0.1); border: 1px solid rgba(0,200,255,0.3); color: #00c8ff; border-radius: 4px; cursor: pointer; }
        .sidebar-center-actions .btn-sdel { border-color: rgba(231,76,60,0.3); color: #e74c3c; background: rgba(231,76,60,0.1); }

        /* 记录面板 */
        .record-item {
            padding: 8px;
            background: rgba(0,0,0,0.3);
            border-radius: 6px;
            margin-bottom: 5px;
            border-left: 3px solid #ffaa00;
        }
        .record-item.type-material { border-left-color: #27ae60; }
        .record-item.type-system { border-left-color: #3498db; }
        .record-item.type-planet { border-left-color: #9b59b6; }
        .record-item.type-note { border-left-color: #ffaa00; }
        .record-title { color: #ffaa00; font-size: 12px; font-weight: bold; }
        .record-title.type-material { color: #27ae60; }
        .record-title.type-system { color: #3498db; }
        .record-title.type-planet { color: #9b59b6; }
        .record-detail { color: #888; font-size: 11px; margin-top: 2px; }
        .record-note { color: #ccc; font-size: 11px; margin-top: 3px; }
        .record-actions { margin-top: 5px; }
        .record-actions button { padding: 3px 8px; font-size: 10px; background: rgba(231,76,60,0.1); border: 1px solid rgba(231,76,60,0.3); color: #e74c3c; border-radius: 4px; cursor: pointer; }

        /* 添加记录弹窗 */
        .record-modal-content { max-width: 350px; }
        .record-type-switch { display: flex; gap: 4px; margin-bottom: 10px; background: rgba(0,0,0,0.3); padding: 4px; border-radius: 5px; }
        .record-type-btn { flex: 1; padding: 6px; background: transparent; border: none; color: #888; border-radius: 4px; cursor: pointer; font-size: 11px; }
        .record-type-btn.active { background: rgba(255,170,0,0.2); color: #ffaa00; }
        .record-type-btn.active.type-material { background: rgba(39,174,96,0.2); color: #27ae60; }
        .record-type-btn.active.type-system { background: rgba(52,152,219,0.2); color: #3498db; }
        .record-type-btn.active.type-planet { background: rgba(155,89,182,0.2); color: #9b59b6; }

        /* 其他 */
        .loading { text-align: center; padding: 20px; color: #00c8ff; }
        .empty-state { text-align: center; padding: 20px; color: #666; }
        .empty-state .icon { font-size: 30px; opacity: 0.5; }
        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); padding: 10px 20px; background: #00c8ff; color: #0a0a12; border-radius: 25px; z-index: 1002; animation: fadeOut 2s forwards; font-size: 13px; }
        @keyframes fadeOut { 0% { opacity: 1; } 100% { opacity: 0; } }
        .footer { text-align: center; padding: 15px; }
        .footer a { color: #00c8ff; opacity: 0.7; text-decoration: none; }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #00c8ff; border-radius: 3px; }

        /* 响应式：移动端侧边栏隐藏，可通过按钮展开 */
        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                top: 0; right: -270px;
                width: 260px;
                height: 100%;
                background: #050510;
                z-index: 400;
                padding: 50px 10px 10px 10px;
                transition: right 0.3s;
                overflow-y: auto;
                border-left: 1px solid rgba(0,200,255,0.2);
            }
            .sidebar.open { right: 0; }
            .sidebar-toggle { display: block; }
            .sidebar-close {
                position: absolute;
                top: 10px; right: 10px;
                padding: 5px 10px;
                background: rgba(231,76,60,0.2);
                border: 1px solid #e74c3c;
                color: #e74c3c;
                border-radius: 5px;
                cursor: pointer;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <!-- 星空背景 -->
    <div class="stars-bg"></div>
    <div class="nebula"></div>
    <div class="stars" id="starsContainer"></div>
    <div class="meteor"></div>
    <div class="meteor"></div>
    <div class="meteor"></div>

    <!-- 移动端侧边栏切换按钮 -->
    <button class="sidebar-toggle" onclick="toggleSidebar()">侧栏</button>

    <div class="main-layout">
        <!-- 左侧主内容 -->
        <div class="main-content">
            <div class="header">
                <h1>EVE行星材料查询</h1>
                <p>选择星座或搜索星系查看材料产出</p>
            </div>

            <!-- 搜索区域 -->
            <div class="search-section">
                <div class="search-tabs">
                    <button class="search-tab active" onclick="switchTab('constellation')">按星座查询</button>
                    <button class="search-tab" onclick="switchTab('planet')">按星系搜索</button>
                </div>

                <!-- 按星座查询 -->
                <div id="constellationTab">
                    <div class="search-row">
                        <select id="regionSelect"><option value="">选择星域</option></select>
                        <select id="constellationSelect"><option value="">选择星座</option></select>
                    </div>
                    <div class="search-row">
                        <select id="categorySelect" onchange="updateProductSelect()"><option value="">全部分类</option></select>
                        <select id="productSelect"><option value="">全部产物</option></select>
                        <button class="btn-search" onclick="queryConstellation()" style="flex:0 0 auto; padding: 10px 20px;">查询星球</button>
                    </div>
                </div>

                <!-- 按星系搜索 -->
                <div id="planetTab" style="display:none">
                    <div class="hint">输入星系名称，自动定位到对应星座</div>
                    <div class="search-row">
                        <div class="search-wrapper">
                            <input type="text" id="planetSearchInput" placeholder="输入星系名称（如：Y-2ANO）" oninput="onPlanetSearchInput()">
                            <div class="search-dropdown" id="planetDropdown"></div>
                        </div>
                        <button class="btn-search" onclick="searchByPlanet()">定位</button>
                    </div>
                    <!-- 产物选择和结果显示 -->
                    <div id="planetProductSelect" style="display:none; margin-top: 10px;">
                    </div>
                </div>
            </div>

            <!-- 结果 -->
            <div class="results-section">
                <div class="results-header">
                    <h3>查询结果</h3>
                    <span class="result-count" id="resultCount"></span>
                </div>
                <div class="results-list" id="resultsList">
                    <div class="empty-state">
                        <div class="icon">🪐</div>
                        <p>选择星座或搜索星系查看材料产出</p>
                    </div>
                </div>
            </div>

            <div class="footer">
                <span style="color: #666; font-size: 12px;">EVE行星材料查询</span>
            </div>
        </div>

        <!-- 右侧侧边栏 -->
        <div class="sidebar" id="sidebar">
            <button class="sidebar-close" onclick="toggleSidebar()" style="display:none">X</button>

            <!-- 行星开采中心位置列表 -->
            <div class="sidebar-panel">
                <div class="sidebar-panel-header">
                    <h3>行星开采中心位置</h3>
                    <button class="btn-add" onclick="showAddCenterModal()">+ 添加</button>
                </div>
                <div id="centerList">
                    <div class="empty-state" style="padding:10px"><p>暂无开采中心</p></div>
                </div>
            </div>

            <!-- 采集记录列表 -->
            <div class="sidebar-panel">
                <div class="sidebar-panel-header">
                    <h3>采集记录</h3>
                    <button class="btn-add" onclick="showAddRecordModal()">+ 添加</button>
                </div>
                <div id="recordList">
                    <div class="empty-state" style="padding:10px"><p>暂无记录</p></div>
                </div>
            </div>
        </div>
    </div>

    <!-- 添加开采中心弹窗 -->
    <div class="modal" id="addCenterModal">
        <div class="modal-content">
            <h3>添加开采中心</h3>
            <div class="mode-switch">
                <button class="mode-btn active" onclick="switchCenterMode('planet')">搜索星系定位</button>
                <button class="mode-btn" onclick="switchCenterMode('select')">手动选择</button>
            </div>

            <div id="planetMode">
                <div class="hint">输入星系名称，自动定位星域和星座</div>
                <div class="search-wrapper">
                    <input type="text" id="centerPlanetSearch" placeholder="输入星系名称" oninput="onCenterPlanetSearch()">
                    <div class="search-dropdown" id="centerPlanetDropdown"></div>
                </div>
                <div id="selectedPlanetInfo" style="display:none; padding: 10px; background: rgba(0,200,255,0.1); border-radius: 8px; margin-bottom: 10px;">
                    <div style="color: #888; font-size: 12px;">已定位：</div>
                    <div id="selectedPlanetDisplay" style="color: #00c8ff;"></div>
                </div>
            </div>

            <div id="selectMode" style="display:none">
                <select id="centerRegionSelect"><option value="">选择星域</option></select>
                <select id="centerConstellationSelect"><option value="">选择星座</option></select>
            </div>

            <input type="text" id="centerNameInput" placeholder="中心名称（如：主基地）">
            <input type="text" id="centerPlanetInput" placeholder="具体行星（可选，如：星球名 三）">

            <div class="modal-buttons">
                <button class="btn-cancel" onclick="hideAddCenterModal()">取消</button>
                <button class="btn-confirm" onclick="addCenter()">确认添加</button>
            </div>
        </div>
    </div>

    <!-- 采集记录弹窗 -->
    <div class="modal" id="addRecordModal">
        <div class="modal-content record-modal-content">
            <h3>添加采集记录</h3>

            <div class="record-type-switch">
                <button class="record-type-btn active type-material" onclick="switchRecordType('material')">材料</button>
                <button class="record-type-btn" onclick="switchRecordType('system')">星系</button>
                <button class="record-type-btn" onclick="switchRecordType('planet')">行星</button>
                <button class="record-type-btn" onclick="switchRecordType('note')">备注</button>
            </div>

            <div id="recordMaterialFields">
                <input type="text" id="recordMaterialName" placeholder="材料名称（如：聚芳酰胺）" oninput="onRecordMaterialSearch()">
                <div class="search-wrapper">
                    <div class="search-dropdown" id="recordMaterialDropdown"></div>
                </div>
            </div>

            <div id="recordSystemFields" style="display:none">
                <input type="text" id="recordSystemName" placeholder="星系名称（如：J-9M7D）" oninput="onRecordSystemSearch()">
                <div class="search-wrapper">
                    <div class="search-dropdown" id="recordSystemDropdown"></div>
                </div>
            </div>

            <div id="recordPlanetFields" style="display:none">
                <input type="text" id="recordPlanetName" placeholder="行星名称（如：J-9M7D 三）">
            </div>

            <div id="recordNoteFields" style="display:none">
                <input type="text" id="recordNoteTitle" placeholder="标题">
            </div>

            <textarea id="recordNote" placeholder="备注说明（可选）" style="width:100%;padding:10px;background:#0a0a12;border:1px solid #333;color:#fff;border-radius:8px;resize:vertical;min-height:60px;margin-bottom:10px;font-size:13px;"></textarea>

            <div class="modal-buttons">
                <button class="btn-cancel" onclick="hideAddRecordModal()">取消</button>
                <button class="btn-confirm" onclick="addRecord()">确认添加</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
