name: Upload Files
on:
  push:
    branches:
      - main
jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v3
    - name: Upload files
      run: |
        # 这里假设你要上传的文件在本地的 /path/to/files 目录
        # 你需要替换为实际路径
        mkdir -p eve-pi-search2
        cp -r "E:\\Claude_Code_Objects\\EVE行星产物查询\\data/*" eve-pi-search2
        git add eve-pi-search2
        git commit -m "Upload files"
        git push
